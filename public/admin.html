<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prank Control Panel</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🎮</text></svg>" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #09090b;
      color: #e0e0e0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: #0c0c0e;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f43f5e;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .online-count {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 500;
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.2);
    }

    .online-count.zero {
      background: rgba(255,255,255,0.04);
      color: #555;
      border-color: rgba(255,255,255,0.08);
    }

    /* ── Main Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar: User List ── */
    .sidebar {
      width: 260px;
      border-right: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      background: #0c0c0e;
      flex-shrink: 0;
    }

    .sidebar-title {
      padding: 14px 18px;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .user-item:hover { background: rgba(255,255,255,0.04); }
    .user-item.active { background: rgba(244, 63, 94, 0.1); }

    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      flex-shrink: 0;
      position: relative;
    }

    .user-avatar .online-dot {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid #0c0c0e;
    }

    .user-info { flex: 1; min-width: 0; }

    .user-name {
      font-size: 13px;
      font-weight: 500;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-preview {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .unread-badge {
      min-width: 18px;
      height: 18px;
      background: #f43f5e;
      color: #fff;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
    }

    .unread-badge.hidden { display: none; }

    .no-users {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #333;
      font-size: 13px;
      gap: 8px;
      padding: 20px;
      text-align: center;
    }

    .no-users span { font-size: 28px; }

    /* ── Chat Panel ── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #09090b;
    }

    /* Chat header */
    .chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0c0c0e;
      flex-shrink: 0;
    }

    .chat-header .ch-name {
      font-size: 14px;
      font-weight: 600;
      color: #eee;
    }

    .chat-header .ch-status {
      font-size: 11px;
      color: #4ade80;
    }

    .empty-chat-header {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      font-size: 13px;
      color: #444;
      background: #0c0c0e;
      flex-shrink: 0;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.5;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.from-user {
      align-self: flex-start;
      background: rgba(255,255,255,0.06);
      color: #ddd;
      border-bottom-left-radius: 4px;
    }

    .msg.from-admin {
      align-self: flex-end;
      background: linear-gradient(135deg, #6c5ce7, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg .msg-time {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 4px;
    }

    .msg.from-user .msg-time { text-align: left; }
    .msg.from-admin .msg-time { text-align: right; }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #2a2a2a;
      font-size: 14px;
      gap: 8px;
    }

    .empty-state span { font-size: 36px; }

    /* Reply area */
    .reply-area {
      padding: 12px 16px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }

    .quick-replies {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .quick-reply {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 5px 11px;
      font-size: 11px;
      color: #777;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .quick-reply:hover {
      border-color: rgba(244, 63, 94, 0.4);
      color: #ccc;
    }

    .reply-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .reply-input-row textarea {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 16px;
      color: #eee;
      font-size: 13.5px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    .reply-input-row textarea:focus { border-color: rgba(244, 63, 94, 0.5); }
    .reply-input-row textarea::placeholder { color: #444; }
    .reply-input-row textarea:disabled { opacity: 0.3; }

    .send-reply {
      height: 44px;
      padding: 0 20px;
      background: #f43f5e;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      font-family: inherit;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .send-reply:hover { background: #e11d48; }
    .send-reply:disabled { background: #333; cursor: not-allowed; }

    .reply-hint {
      font-size: 11px;
      color: #333;
      margin-top: 6px;
      text-align: center;
    }

    /* ── Toast Notification ── */
    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: #1a1a1e;
      border: 1px solid rgba(244, 63, 94, 0.3);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 3s forwards;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      cursor: pointer;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(60px); }
    }

    .toast-dot {
      width: 8px;
      height: 8px;
      background: #f43f5e;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .toast-text {
      font-size: 13px;
      color: #ddd;
    }

    .toast-text strong { color: #f43f5e; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 3px; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .sidebar { width: 70px; }
      .user-info, .sidebar-title { display: none; }
      .user-item { justify-content: center; padding: 10px 6px; }
      .unread-badge {
        position: absolute;
        top: 4px;
        right: 4px;
        min-width: 14px;
        height: 14px;
        font-size: 8px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Prank Control Panel</h1>
    <div class="header-right">
      <div class="online-count zero" id="onlineCount">0 online</div>
    </div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-title">Victims</div>
      <div class="user-list" id="userList">
        <div class="no-users" id="noUsers">
          <span>&#128373;</span>
          Waiting for victims to connect...
        </div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">
      <div class="empty-chat-header" id="chatHeader">Select a victim to start replying</div>

      <div class="messages" id="messagesArea">
        <div class="empty-state" id="emptyState">
          <span>&#128172;</span>
          Select a victim from the sidebar
        </div>
      </div>

      <div class="reply-area">
        <div class="quick-replies">
          <button class="quick-reply" onclick="useQuick(this)">That's a great question!</button>
          <button class="quick-reply" onclick="useQuick(this)">Let me think about that...</button>
          <button class="quick-reply" onclick="useQuick(this)">Based on my training data...</button>
          <button class="quick-reply" onclick="useQuick(this)">I'd be happy to help!</button>
          <button class="quick-reply" onclick="useQuick(this)">I don't have access to real-time data.</button>
          <button class="quick-reply" onclick="useQuick(this)">As an AI language model...</button>
        </div>
        <div class="reply-input-row">
          <textarea id="replyInput" rows="1" placeholder="Type your 'AI' response..." disabled></textarea>
          <button class="send-reply" id="sendReply" onclick="sendReply()" disabled>Send</button>
        </div>
        <div class="reply-hint">Enter to send &bull; Shift+Enter for new line</div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    socket.emit("register-admin");

    const userListEl = document.getElementById("userList");
    const noUsers = document.getElementById("noUsers");
    const chatHeader = document.getElementById("chatHeader");
    const messagesArea = document.getElementById("messagesArea");
    const emptyState = document.getElementById("emptyState");
    const replyInput = document.getElementById("replyInput");
    const sendReplyBtn = document.getElementById("sendReply");
    const onlineCount = document.getElementById("onlineCount");
    const toastContainer = document.getElementById("toastContainer");

    // State
    // users: Map<id, { name, messages: [{role, text, time}], unread }>
    const users = new Map();
    let activeUserId = null;
    let typingTimeout = null;

    // Audio notification
    function playSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (e) {}
    }

    function showToast(name, text) {
      const toast = document.createElement("div");
      toast.className = "toast";
      const preview = text.length > 50 ? text.slice(0, 50) + "..." : text;
      toast.innerHTML = `
        <div class="toast-dot"></div>
        <div class="toast-text"><strong>${esc(name)}</strong>: ${esc(preview)}</div>
      `;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.remove(), 3500);
    }

    function updateOnlineCount() {
      const count = users.size;
      onlineCount.textContent = `${count} online`;
      onlineCount.className = count > 0 ? "online-count" : "online-count zero";
    }

    // ── Socket Events ──

    socket.on("user-list", (list) => {
      list.forEach(u => {
        users.set(u.id, { name: u.name, messages: [], unread: 0 });
      });
      renderUserList();
      updateOnlineCount();
    });

    socket.on("user-joined", ({ id, name }) => {
      users.set(id, { name, messages: [], unread: 0 });
      renderUserList();
      updateOnlineCount();
      showToast(name, "just connected");
      playSound();
    });

    socket.on("user-left", ({ id, name }) => {
      users.delete(id);
      if (activeUserId === id) {
        activeUserId = null;
        renderChat();
      }
      renderUserList();
      updateOnlineCount();
    });

    socket.on("user-message", ({ userId, name, text }) => {
      const user = users.get(userId);
      if (!user) return;

      user.messages.push({
        role: "user",
        text,
        time: new Date(),
      });

      if (userId !== activeUserId) {
        user.unread++;
      }

      renderUserList();
      playSound();
      showToast(name, text);

      if (userId === activeUserId) {
        renderChat();
        messagesArea.scrollTop = messagesArea.scrollHeight;
      }
    });

    // ── Render ──

    function renderUserList() {
      const hasUsers = users.size > 0;
      noUsers.style.display = hasUsers ? "none" : "flex";

      // Remove old items (keep noUsers)
      userListEl.querySelectorAll(".user-item").forEach(el => el.remove());

      for (const [id, user] of users) {
        const item = document.createElement("div");
        item.className = `user-item${id === activeUserId ? " active" : ""}`;
        item.onclick = () => selectUser(id);

        const lastMsg = user.messages.length > 0
          ? user.messages[user.messages.length - 1].text
          : "No messages yet";

        const preview = lastMsg.length > 30 ? lastMsg.slice(0, 30) + "..." : lastMsg;

        item.innerHTML = `
          <div class="user-avatar">
            ${esc(user.name.charAt(0).toUpperCase())}
            <div class="online-dot"></div>
          </div>
          <div class="user-info">
            <div class="user-name">${esc(user.name)}</div>
            <div class="user-preview">${esc(preview)}</div>
          </div>
          <div class="unread-badge${user.unread > 0 ? "" : " hidden"}">${user.unread}</div>
        `;

        userListEl.appendChild(item);
      }
    }

    function selectUser(id) {
      activeUserId = id;
      const user = users.get(id);
      if (user) {
        user.unread = 0;
      }
      replyInput.disabled = false;
      sendReplyBtn.disabled = false;
      replyInput.focus();
      renderUserList();
      renderChat();
    }

    function renderChat() {
      if (!activeUserId || !users.has(activeUserId)) {
        chatHeader.innerHTML = `<div class="empty-chat-header">Select a victim to start replying</div>`;
        messagesArea.innerHTML = `<div class="empty-state"><span>&#128172;</span>Select a victim from the sidebar</div>`;
        replyInput.disabled = true;
        sendReplyBtn.disabled = true;
        return;
      }

      const user = users.get(activeUserId);

      chatHeader.innerHTML = `
        <div class="chat-header">
          <div class="user-avatar" style="width:30px;height:30px;font-size:12px;">
            ${esc(user.name.charAt(0).toUpperCase())}
            <div class="online-dot"></div>
          </div>
          <div>
            <div class="ch-name">${esc(user.name)}</div>
            <div class="ch-status">Online</div>
          </div>
        </div>
      `;

      if (user.messages.length === 0) {
        messagesArea.innerHTML = `<div class="empty-state"><span>&#9203;</span>Waiting for ${esc(user.name)} to ask something...</div>`;
        return;
      }

      messagesArea.innerHTML = "";
      user.messages.forEach(m => {
        const div = document.createElement("div");
        div.className = `msg ${m.role === "user" ? "from-user" : "from-admin"}`;
        const timeStr = m.time.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        div.innerHTML = `${esc(m.text).replace(/\n/g, "<br>")}<div class="msg-time">${timeStr}</div>`;
        messagesArea.appendChild(div);
      });

      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // ── Reply ──

    replyInput.addEventListener("input", () => {
      // Auto resize
      replyInput.style.height = "auto";
      replyInput.style.height = Math.min(replyInput.scrollHeight, 120) + "px";

      if (activeUserId) {
        socket.emit("admin-typing", activeUserId);
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          socket.emit("admin-stop-typing", activeUserId);
        }, 1500);
      }
    });

    replyInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendReply();
      }
    });

    function sendReply() {
      const text = replyInput.value.trim();
      if (!text || !activeUserId) return;

      socket.emit("admin-stop-typing", activeUserId);
      socket.emit("admin-reply", { userId: activeUserId, text });

      const user = users.get(activeUserId);
      if (user) {
        user.messages.push({
          role: "admin",
          text,
          time: new Date(),
        });
      }

      replyInput.value = "";
      replyInput.style.height = "auto";
      renderUserList();
      renderChat();
    }

    function useQuick(el) {
      replyInput.value = el.textContent;
      replyInput.disabled = false;
      replyInput.focus();
    }

    function esc(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
  </script>
</body>
</html>
